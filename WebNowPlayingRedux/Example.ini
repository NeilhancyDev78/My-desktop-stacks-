[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,0

[Metadata]
Name=PlayerInfo (Clean Rounded)
Author=Neil
Version=1.3

; ---------------- VARIABLES ----------------
[Variables]
FontMain=Segoe UI Semibold
FontBold=Segoe UI Black

Text=20,20,20
SubText=90,90,90

; ---------------- MEASURES ----------------
[MeasureTitle]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Title
Substitute="":"..."

[MeasureArtist]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Artist
Substitute="":"..."

[MeasureAlbumArt]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Cover
DefaultPath=#@#Images\nocover.png

; ---------------- ALBUM ART (ROUNDED SAFE) ----------------
[MeterAlbumArt]
Meter=Image
MeasureName=MeasureAlbumArt
X=0
Y=0
W=72
H=72
PreserveAspectRatio=1
DynamicVariables=1

; overlay rounded mask
[MeterAlbumMask]
Meter=Image
ImageName=#@#Images\roundmask.png
X=0
Y=0
W=72
H=72

; ---------------- TITLE (BIGGER) ----------------
[MeterTitle]
Meter=String
MeasureName=MeasureTitle
X=82
Y=12
W=220
H=26
FontFace=#FontBold#
FontSize=13
FontColor=#Text#
StringAlign=Left
AntiAlias=1
ClipString=1

; ---------------- ARTIST ----------------
[MeterArtist]
Meter=String
MeasureName=MeasureArtist
X=82
Y=38
W=220
H=20
FontFace=#FontMain#
FontSize=10
FontColor=#SubText#
StringAlign=Left
AntiAlias=1
ClipString=1