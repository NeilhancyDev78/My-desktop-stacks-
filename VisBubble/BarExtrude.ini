[Metadata]
Name=VisBubble Ecru Flow
Author=undefinist + enhanced by ChatGPT
Version=5.0
License=CC BY-NC-SA 3.0
Information=Smooth ambient luxury visualizer for warm wallpapers

[Rainmeter]
Update=10
AccurateText=1
DynamicWindowSize=1
ContextTitle=SETTINGS (double-click)
ContextAction=[!ActivateConfig "#ROOTCONFIG#\SettingsWindow"]
ContextTitle2=SETTINGS FILE
ContextAction2=["#ROOTCONFIGPATH#Settings.inc"]

[Variables]
@Include=Settings.inc

FORMULA_SUM=([mBand%%]+(#Smoothing#=0?0:(%%={#NumOfItems#-1}?0:[mBand{(%%+1)%#NumOfItems#}])+(%%=0?0:[mBand{%%=0?#NumOfItems#-1:%%-1}])))

FORMULA_SUM_FULL=([mBand%%]+(#Smoothing#=0?0:[mBand{(%%+1)%#NumOfItems#}]+[mBand{%%=0?#NumOfItems#-1:%%-1}]))

FORMULA_AVG_NUM=((%%={#NumOfItems#-1}||%%=0)?2:3)

FORMULA_AVG_NUM_FULL=3

FORMULA_AVG=#FORMULA_SUM_FULL#/#FORMULA_AVG_NUM_FULL#

FORMULA_THETA=(#AngleTotal#-#AngleTotal#/#NumOfItems#*(#ClockWise#=0?%%:#NumOfItems#-%%-1)+#AngleStart#)

; =========================
; VISUAL COLORS
; =========================

ItemColor=255,245,230
GlowColor=255,230,200,18

Radius=190
RadiusY=190

ExtrudeMin=15
ExtrudeMax=70

ItemWidth=2

Smoothing=1

BackgroundRingAlpha=18

@Include2=#INC#Common.inc

; =========================
; AUDIO
; =========================

[mAudioOut]
Measure=Plugin
Plugin=AudioLevel
Port=Output
FFTSize=4096
FFTAttack=120
FFTDecay=180
Sensitivity=65
Bands=(#NumOfItems#+1)

[mBass]
Measure=Plugin
Plugin=AudioLevel
Parent=mAudioOut
Type=Band
BandIdx=1

; =========================
; FLOATING MOTION
; =========================

[mPulse]
Measure=Calc
Formula=(Sin(Time/1200)*8)+(Cos(Time/1800)*4)+([mBass]*6)
DynamicVariables=1

; =========================
; BACKGROUND RING
; =========================

[BackgroundRing]
Meter=Roundline
X=(#Radius#+#ExtrudeMax#)
Y=(#RadiusY#+#ExtrudeMax#)
StartAngle=0
RotationAngle=(PI*2)
LineStart=0
LineLength=#Radius#
LineColor=255,240,225,#BackgroundRingAlpha#
LineWidth=1
AntiAlias=1

; =========================
; GLOW STYLE
; =========================

[styleGlow]
LineColor=#GlowColor#
LineWidth=(#ItemWidth#*5)
RotationAngle=(#Inward#*PI)
ControlAngle=0
AntiAlias=1
Blur=1
DynamicVariables=1
LineStartCap=Round
LineEndCap=Round

; =========================
; MAIN STYLE
; =========================

[styleLine]
LineColor=#ItemColor#
LineWidth=#ItemWidth#
RotationAngle=(#Inward#*PI)
ControlAngle=0
AntiAlias=1
Blur=1
DynamicVariables=1
LineStartCap=Round
LineEndCap=Round

; =========================
; FULL CIRCLE CHECK
; =========================

[mFullCircle]
Measure=Calc
IfCondition=#AngleTotal# >= PI * 2
IfTrueAction=[!WriteKeyValue Variables FORMULA_AVG "#*FORMULA_SUM_FULL*#/#*FORMULA_AVG_NUM_FULL*#"]
IfFalseAction=[!WriteKeyValue Variables FORMULA_AVG "#*FORMULA_SUM*#/#*FORMULA_AVG_NUM*#"]
UpdateDivider=-1

; =========================
; BAND MEASURES
; =========================

[sFactoryBandMeasures]
Measure=Script
ScriptFile=#SCRIPT#Factory.lua
IncFile=#INC#BandMeasures.inc
Number=#NumOfItems#
SectionName=mBand%%

Option0=Measure
Value0=Plugin

Option1=Plugin
Value1=AudioLevel

Option2=Parent
Value2=mAudioOut

Option3=Type
Value3=Band

Option4=BandIdx
Value4={%%+1}

UpdateDivider=-1
@Include=#INC#BandMeasures.inc

; =========================
; GLOW BARS
; =========================

[sFactoryGlowBars]
Measure=Script
ScriptFile=#SCRIPT#Factory.lua
IncFile=#INC#GlowLines.inc
Number=#NumOfItems#

SectionName=Glow%%

Option0=Meter
Value0=Roundline

Option1=MeterStyle
Value1=styleGlow

Option2=StartAngle
Value2={#FORMULA_THETA#}

Option3=X
Value3={(#Radius#+[mPulse])*Cos(#FORMULA_THETA#%(PI*2))+#Radius#+#ExtrudeMax#}

Option4=Y
Value4={(#RadiusY#+[mPulse])*Sin(#FORMULA_THETA#%(PI*2))+#RadiusY#+#ExtrudeMax#}

Option5=LineLength
Value5=((Clamp((#FORMULA_AVG#*0.75)+([mBand%%]*0.55),0,1))*(#ExtrudeMax#-#ExtrudeMin#)+#ExtrudeMin#)

Option6=DynamicVariables
Value6=1

UpdateDivider=-1
@Include=#INC#GlowLines.inc

; =========================
; MAIN BARS
; =========================

[sFactoryBars]
Measure=Script
ScriptFile=#SCRIPT#Factory.lua
IncFile=#INC#Lines.inc
Number=#NumOfItems#

SectionName=%%

Option0=Meter
Value0=Roundline

Option1=MeterStyle
Value1=styleLine

Option2=StartAngle
Value2={#FORMULA_THETA#}

Option3=X
Value3={(#Radius#+[mPulse])*Cos(#FORMULA_THETA#%(PI*2))+#Radius#+#ExtrudeMax#}

Option4=Y
Value4={(#RadiusY#+[mPulse])*Sin(#FORMULA_THETA#%(PI*2))+#RadiusY#+#ExtrudeMax#}

Option5=LineLength
Value5=((Clamp((#FORMULA_AVG#*0.75)+([mBand%%]*0.55),0,1))*(#ExtrudeMax#-#ExtrudeMin#)+#ExtrudeMin#)

Option6=DynamicVariables
Value6=1

UpdateDivider=-1
@Include=#INC#Lines.inc

; =========================
; REFRESH
; =========================

[sRefresher]
Measure=Script
ScriptFile=#SCRIPT#Refresher.lua
UpdateDivider=-1
Refreshed=0

[sColor]
Measure=Script
ScriptFile=#SCRIPT#Color.lua
UpdateDivider=-1
NumOfItems=#NumOfItems#
Color=#ItemColor#
