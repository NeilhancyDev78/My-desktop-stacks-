[Rainmeter]
Update=1000
@Include=#@#Styles\Themes.inc

[Metadata]
Name=Preset - AMOLEDBig
Author=You

[MeterDummy]
Meter=String
Hidden=1

[MeasureStart]
Measure=Calc
Formula=1
UpdateDivider=-1
DynamicVariables=1
OnUpdateAction=[
!WriteKeyValue Variables ThemeName "AMOLED" "#@#Settings\User.inc"
!WriteKeyValue Variables IsGlass 0 "#@#Settings\User.inc"
!WriteKeyValue Variables BgFill "#AMOLED_BgFill#" "#@#Settings\User.inc"
!WriteKeyValue Variables Border "#AMOLED_Border#" "#@#Settings\User.inc"
!WriteKeyValue Variables Glow "#AMOLED_Glow#" "#@#Settings\User.inc"
!WriteKeyValue Variables TextMain "#AMOLED_TextMain#" "#@#Settings\User.inc"
!WriteKeyValue Variables TextGlow "#AMOLED_TextGlow#" "#@#Settings\User.inc"
!WriteKeyValue Variables TextFaded "#AMOLED_TextFaded#" "#@#Settings\User.inc"
!WriteKeyValue Variables SizeName "Large" "#@#Settings\User.inc"
!ActivateConfig "#CURRENTCONFIG#" "_System\Main_Large.ini"
!DeactivateConfig "#CURRENTCONFIG#" "_Presets\AMOLEDBig.ini"
]