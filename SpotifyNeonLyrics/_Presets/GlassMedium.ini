[Rainmeter]
Update=1000
@Include=#@#Styles\Themes.inc

[Metadata]
Name=Preset - GlassMedium
Author=You

[MeterDummy]
Meter=String
Hidden=1

[MeasureStart]
Measure=Calc
Formula=1
UpdateDivider=-1
DynamicVariables=1
OnUpdateAction=[
!WriteKeyValue Variables ThemeName "Glass" "#@#Settings\User.inc"
!WriteKeyValue Variables IsGlass 1 "#@#Settings\User.inc"
!WriteKeyValue Variables BgFill "#Glass_BgFill#" "#@#Settings\User.inc"
!WriteKeyValue Variables Border "#Glass_Border#" "#@#Settings\User.inc"
!WriteKeyValue Variables Glow "#Glass_Glow#" "#@#Settings\User.inc"
!WriteKeyValue Variables TextMain "#Glass_TextMain#" "#@#Settings\User.inc"
!WriteKeyValue Variables TextGlow "#Glass_TextGlow#" "#@#Settings\User.inc"
!WriteKeyValue Variables TextFaded "#Glass_TextFaded#" "#@#Settings\User.inc"
!WriteKeyValue Variables SizeName "Medium" "#@#Settings\User.inc"
!ActivateConfig "SpotifyNeonLyrics" "_System\Main_Medium.ini"
!DeactivateConfig "SpotifyNeonLyrics" "_Presets\GlassMedium.ini"
]