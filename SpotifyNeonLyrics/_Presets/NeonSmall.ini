[Rainmeter]
Update=1000
@Include=#@#Styles\Themes.inc

[Metadata]
Name=Preset - NeonSmall
Author=You

[MeterDummy]
Meter=String
Hidden=1

[MeasureStart]
Measure=Calc
Formula=1
UpdateDivider=-1
DynamicVariables=1
OnUpdateAction=[
!WriteKeyValue Variables ThemeName "Neon" "#@#Settings\User.inc"
!WriteKeyValue Variables IsGlass 0 "#@#Settings\User.inc"
!WriteKeyValue Variables BgFill "#Neon_BgFill#" "#@#Settings\User.inc"
!WriteKeyValue Variables Border "#Neon_Border#" "#@#Settings\User.inc"
!WriteKeyValue Variables Glow "#Neon_Glow#" "#@#Settings\User.inc"
!WriteKeyValue Variables TextMain "#Neon_TextMain#" "#@#Settings\User.inc"
!WriteKeyValue Variables TextGlow "#Neon_TextGlow#" "#@#Settings\User.inc"
!WriteKeyValue Variables TextFaded "#Neon_TextFaded#" "#@#Settings\User.inc"
!WriteKeyValue Variables SizeName "Small" "#@#Settings\User.inc"
!ActivateConfig "#CURRENTCONFIG#" "_System\Main_Small.ini"
!DeactivateConfig "#CURRENTCONFIG#" "_Presets\NeonSmall.ini"
]