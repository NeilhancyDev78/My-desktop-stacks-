[Rainmeter]
Update=50
AccurateText=1
DynamicWindowSize=1
OnRefreshAction=[!CommandMeasure MeasureLyricsFetch "Run"]

[Variables]
@Include=#@#Settings\User.inc

[MeterBackground]
Meter=Shape
Group=UI
Shape=Rectangle 0,0,#PanelW#,#PanelH#,#Roundness# | Fill Color #BgFill# | StrokeWidth 2 | Stroke Color #Border#
DynamicVariables=1

[MeterInnerBorder]
Meter=Shape
Group=UI
Shape=Rectangle 6,6,(#PanelW#-12),(#PanelH#-12),#Roundness# | StrokeWidth 1 | Stroke Color 255,255,255,25 | Fill Color 0,0,0,0
DynamicVariables=1

[MeterGlassSheen]
Meter=Shape
Group=UI
Shape=Rectangle 12,12,(#PanelW#-24),(#PanelH#/3),#Roundness# | Fill LinearGradient SheenGrad | StrokeWidth 0
SheenGrad=90 | 255,255,255,55 ; 255,255,255,0
Hidden=(1-#IsGlass#)
DynamicVariables=1